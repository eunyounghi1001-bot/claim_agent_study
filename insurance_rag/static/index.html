<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사고보상 Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header {
    background: #1a1a2e;
    color: white;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  header h1 { font-size: 1.2rem; font-weight: 600; }

  .layout { display: flex; height: calc(100vh - 56px); }

  /* 사이드바 */
  .sidebar {
    width: 280px;
    background: white;
    border-right: 1px solid #e0e0e0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #e0e0e0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-header h2 { font-size: 0.9rem; color: #666; }
  .btn-new {
    background: #2563eb;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .btn-new:hover { background: #1d4ed8; }

  .case-list { overflow-y: auto; flex: 1; }
  .case-item {
    padding: 14px 16px;
    border-bottom: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background 0.1s;
  }
  .case-item:hover { background: #f8f9fa; }
  .case-item.active { background: #eff6ff; border-left: 3px solid #2563eb; }
  .case-item-id { font-size: 0.8rem; color: #666; }
  .case-item-type { font-size: 0.95rem; font-weight: 500; margin: 2px 0; }
  .case-item-date { font-size: 0.78rem; color: #999; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 600;
  }
  .badge-done    { background: #dcfce7; color: #166534; }
  .badge-wait    { background: #fef9c3; color: #854d0e; }
  .badge-process { background: #dbeafe; color: #1e40af; }

  /* 메인 */
  .main { flex: 1; overflow-y: auto; padding: 24px; }

  /* 접수 폼 */
  .card {
    background: white;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #1a1a2e; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
  textarea, input[type=text] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    font-size: 0.95rem;
    resize: vertical;
    font-family: inherit;
  }
  textarea:focus, input[type=text]:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
  }
  .btn-submit {
    background: #2563eb;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    font-weight: 600;
    width: 100%;
    margin-top: 4px;
    transition: background 0.2s;
  }
  .btn-submit:hover:not(:disabled) { background: #1d4ed8; }
  .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }

  /* 결과 */
  .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .result-section { margin-bottom: 16px; }
  .result-section h3 { font-size: 0.85rem; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }

  .fact-box {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .liability-card {
    border-radius: 10px;
    padding: 16px;
    text-align: center;
  }
  .liability-card.buchek { background: #dcfce7; border: 2px solid #86efac; }
  .liability-card.myunchek { background: #fee2e2; border: 2px solid #fca5a5; }
  .liability-value { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .liability-branch { font-size: 0.85rem; color: #555; }

  .tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    background: #eff6ff;
    color: #1d4ed8;
    padding: 4px 10px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 500;
  }
  .tag.red { background: #fee2e2; color: #b91c1c; }
  .tag.green { background: #dcfce7; color: #166534; }

  .surcharge-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .surcharge-table th, .surcharge-table td {
    padding: 8px 12px;
    border: 1px solid #e5e7eb;
    text-align: center;
  }
  .surcharge-table th { background: #f9fafb; font-weight: 600; }
  .surcharge-table td:first-child { text-align: left; }

  .coverage-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  .coverage-table th, .coverage-table td {
    padding: 8px 12px;
    border: 1px solid #e5e7eb;
    text-align: center;
  }
  .coverage-table th { background: #f9fafb; font-weight: 600; }
  .coverage-table td:first-child { text-align: left; }
  .buchek-cell { color: #166534; font-weight: 600; }
  .myunchek-cell { color: #b91c1c; font-weight: 600; }

  .request-box {
    background: #fffbeb;
    border: 1px solid #fcd34d;
    border-radius: 8px;
    padding: 14px;
    font-size: 0.9rem;
    line-height: 1.6;
  }
  .request-box h3 { color: #92400e; margin-bottom: 8px; font-size: 0.9rem; }

  /* 로딩 */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: white; font-size: 1rem; }

  .empty-state {
    text-align: center;
    color: #999;
    padding: 60px 0;
    font-size: 0.95rem;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  @media (max-width: 768px) {
    .result-grid { grid-template-columns: 1fr; }
    .sidebar { width: 100%; height: auto; }
    .layout { flex-direction: column; }
  }
</style>
</head>
<body>

<header>
  <span style="font-size:1.4rem">🚗</span>
  <h1>사고보상 Agent</h1>
</header>

<div class="layout">
  <!-- 사이드바 -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>사건 목록</h2>
      <button class="btn-new" onclick="showNewForm()">+ 새 접수</button>
    </div>
    <div class="case-list" id="caseList">
      <div class="empty-state" style="padding:30px 0">
        <div>접수된 사건이 없습니다</div>
      </div>
    </div>
  </aside>

  <!-- 메인 -->
  <main class="main" id="mainArea">
    <div class="empty-state">
      <div class="icon">🚗</div>
      <div>새 사건을 접수하거나 목록에서 사건을 선택하세요</div>
    </div>
  </main>
</div>

<!-- 로딩 오버레이 -->
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">AI 분석 중... (1~3분 소요)</div>
</div>

<script>
const API = '';
let currentCaseId = null;

// ── 사건 목록 로드 ──────────────────────────────────
async function loadCases() {
  const res  = await fetch(`${API}/api/cases`);
  const list = await res.json();
  const el   = document.getElementById('caseList');

  if (!list.length) {
    el.innerHTML = '<div class="empty-state" style="padding:30px 0"><div>접수된 사건이 없습니다</div></div>';
    return;
  }

  el.innerHTML = list.map(c => `
    <div class="case-item ${c.case_id === currentCaseId ? 'active' : ''}"
         onclick="loadCase('${c.case_id}')">
      <div class="case-item-id">${c.case_id}</div>
      <div class="case-item-type">${c.accident_type || '사고'}</div>
      <div style="margin:4px 0">${statusBadge(c.final_status)}</div>
      <div class="case-item-date">${c.created_at}</div>
    </div>
  `).join('');
}

function statusBadge(status) {
  if (status === '완료')         return '<span class="badge badge-done">완료</span>';
  if (status === '추가자료 대기 중') return '<span class="badge badge-wait">자료 대기</span>';
  return '<span class="badge badge-process">처리중</span>';
}

// ── 새 접수 폼 ──────────────────────────────────────
function showNewForm() {
  currentCaseId = null;
  document.getElementById('mainArea').innerHTML = `
    <div class="card">
      <h2>📋 사고 접수</h2>
      <div class="form-group">
        <label>접수 내용 *</label>
        <textarea id="userInput" rows="5"
          placeholder="예) 주차장에서 후진하다 지나가던 차를 받았습니다."></textarea>
      </div>
      <div class="form-group">
        <label>현장출동 여부</label>
        <div style="display:flex;gap:12px;margin-top:4px">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0">
            <input type="radio" name="dispatch" value="O"> 출동 요청
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin:0">
            <input type="radio" name="dispatch" value="X" checked> 출동 없음
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>YouTube 블랙박스 URL (선택)</label>
        <input type="text" id="youtubeUrl" placeholder="https://youtube.com/...">
      </div>
      <div class="form-group">
        <label>이미지/영상 파일 (선택)</label>
        <input type="file" id="mediaFiles" multiple accept="image/*,video/*"
               style="padding:8px;border:1px solid #d1d5db;border-radius:8px;width:100%">
      </div>
      <div class="form-group">
        <label>추가 자료 설명 (선택)</label>
        <textarea id="extraData" rows="2"
          placeholder="제출한 자료에 대한 설명을 입력하세요"></textarea>
      </div>
      <button class="btn-submit" onclick="submitCase()">⚖️ AI 분석 시작</button>
    </div>
  `;
}

// ── 사건 접수 ───────────────────────────────────────
async function submitCase() {
  const userInput = document.getElementById('userInput').value.trim();
  if (!userInput) { alert('접수 내용을 입력하세요.'); return; }

  const dispatch = document.querySelector('input[name="dispatch"]:checked').value;
  const dispatchText = dispatch === 'O' ? ' 현장출동 요청함.' : ' 현장출동 없음.';
  const fullInput = userInput + dispatchText;

  showLoading('AI 분석 중... (10~30초 소요)');

  const fd = new FormData();
  fd.append('user_input',  fullInput);
  fd.append('youtube_url', document.getElementById('youtubeUrl').value);
  fd.append('extra_data',  document.getElementById('extraData').value);

  const files = document.getElementById('mediaFiles').files;
  for (const f of files) fd.append('files', f);

  try {
    const res    = await fetch(`${API}/api/cases`, { method: 'POST', body: fd });
    const result = await res.json();
    hideLoading();
    await loadCases();
    currentCaseId = result.case_id;
    renderResult(result);
  } catch(e) {
    hideLoading();
    alert('오류: ' + e.message);
  }
}

// ── 사건 상세 로드 ──────────────────────────────────
async function loadCase(caseId) {
  currentCaseId = caseId;
  const res    = await fetch(`${API}/api/cases/${caseId}`);
  const result = await res.json();
  await loadCases();
  renderResult(result);
}

// ── 추가자료 제출 ───────────────────────────────────
async function submitExtra(caseId) {
  const extra = document.getElementById('extraInput').value.trim();
  if (!extra) { alert('추가 자료 내용을 입력하세요.'); return; }

  showLoading('추가 자료 분석 중...');

  const fd = new FormData();
  fd.append('extra_data', extra);

  const files = document.getElementById('extraFiles').files;
  for (const f of files) fd.append('files', f);

  try {
    const res    = await fetch(`${API}/api/cases/${caseId}/resume`, { method: 'POST', body: fd });
    const result = await res.json();
    hideLoading();
    await loadCases();
    renderResult(result);
  } catch(e) {
    hideLoading();
    alert('오류: ' + e.message);
  }
}

// ── 결과 렌더링 ─────────────────────────────────────
function renderResult(r) {
  const fact      = r.fact      || {};
  const liability = r.liability || {};
  const norm      = r.normalized || {};
  const extra_req = r.extra_request;
  const surcharge = liability['사고부담금'] || {};
  const coverage  = liability['담보별판단'] || {};
  const triggers  = r.triggers  || [];
  const clauses   = r.clause_hits || [];
  const verdicts  = r.verdict_hits || [];
  const isWait    = r.final_status === '추가자료 대기 중';
  const isDone    = r.final_status === '완료';

  const liabilityClass = (liability.liability === '면책(미지급)') ? 'myunchek' : 'buchek';

  document.getElementById('mainArea').innerHTML = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>📁 ${r.case_id || ''}</h2>
        <div style="display:flex;gap:8px;align-items:center">
          ${statusBadge(r.final_status)}
          <button onclick="deleteCase('${r.case_id}')"
            style="background:#fee2e2;color:#b91c1c;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.82rem">
            삭제
          </button>
        </div>
      </div>

      <!-- 접수 내용 -->
      <div class="result-section">
        <h3>접수 내용</h3>
        <div class="fact-box">${r.user_input || norm.text_summary || ''}</div>
        <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
          ${norm.dispatch_yn === 'O'
            ? '<span class="badge" style="background:#dbeafe;color:#1e40af">🚨 현장출동 요청</span>'
            : '<span class="badge" style="background:#f3f4f6;color:#6b7280">현장출동 없음</span>'}
          <span style="font-size:0.82rem;color:#999">${norm.accident_type || ''}</span>
        </div>
      </div>

      <!-- 미디어 분석 결과 -->
      ${norm.media_summary && norm.media_summary !== '제출 자료 없음' ? `
      <div class="result-section">
        <h3>제출 자료 분석</h3>
        <div class="fact-box" style="border-left:3px solid #3b82f6">
          <span style="font-size:0.8rem;color:#2563eb;font-weight:600">🎥 Vision AI 분석 완료</span><br><br>
          ${norm.media_summary}
        </div>
        ${(r.keyframe_urls||[]).length ? `
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px">
          ${(r.keyframe_urls||[]).map((url, i) => `
            <div style="position:relative">
              <img src="${url}" style="width:160px;height:100px;object-fit:cover;border-radius:6px;border:1px solid #e5e7eb;cursor:pointer"
                   onclick="openFrame('${url}')" title="프레임 ${i+1} 클릭하여 확대">
              <span style="position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.6);color:white;font-size:0.7rem;padding:1px 5px;border-radius:3px">
                프레임 ${i+1}
              </span>
            </div>
          `).join('')}
        </div>` : ''}
      </div>` : ''}

      <!-- P1 결과 -->
      ${fact.fact_summary ? `
      <div class="result-section">
        <h3>확정된 사실관계</h3>
        <div class="fact-box">
          <strong>쟁점:</strong> ${fact.key_issue || ''}<br><br>
          ${fact.fact_summary}
          ${fact.confidence ? `<br><br><span style="color:#666;font-size:0.85rem">신뢰도: ${fact.confidence}</span>` : ''}
          ${fact.contradiction ? `<br><span style="color:#b91c1c;font-size:0.85rem">⚠️ ${fact.contradiction}</span>` : ''}
        </div>
      </div>` : fact.key_issue ? `
      <div class="result-section">
        <h3>사실관계 분석</h3>
        <div class="fact-box">
          <strong>쟁점:</strong> ${fact.key_issue || ''}<br><br>
          <span style="color:#b45309">아직 사실관계 확정에 필요한 자료가 부족합니다.</span>
          ${(fact.unresolved||[]).length ? `<br><br><span style="font-size:0.85rem;color:#666">미확정: ${fact.unresolved.join(', ')}</span>` : ''}
        </div>
      </div>` : ''}

      <!-- 자료수집 요청 (자료 대기 중) -->
      ${isWait && extra_req ? (() => {
        const isFirst = norm.dispatch_yn === 'X' && (r.retry_count || 0) <= 1;
        const label   = isFirst ? '📋 1차 자료수집 요청' : '📨 추가 자료 요청';
        const items   = extra_req.request_items || [];
        return `
        <div class="result-section">
          <div class="request-box" style="${isFirst ? 'background:#eff6ff;border-color:#93c5fd' : ''}">
            <h3 style="${isFirst ? 'color:#1e40af' : ''}">${label}</h3>
            ${items.length ? `
            <ol style="margin:10px 0 10px 18px;line-height:2">
              ${items.map(it => `
                <li>
                  <strong>${it.item}</strong>
                  <span style="color:#666;font-size:0.85rem"> — ${it.reason}</span>
                </li>
              `).join('')}
            </ol>` : ''}
            <p style="margin-top:6px">${extra_req.request_msg || ''}</p>
          </div>
          <div style="margin-top:14px">
            <textarea id="extraInput" rows="3" style="width:100%;padding:10px;border:1px solid #d1d5db;border-radius:8px;margin-bottom:8px"
              placeholder="제출 자료에 대한 설명을 입력하세요"></textarea>
            <input type="file" id="extraFiles" multiple accept="image/*,video/*"
              style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:8px;margin-bottom:8px">
            <button class="btn-submit" onclick="submitExtra('${r.case_id}')">📤 자료 제출</button>
          </div>
        </div>`;
      })() : ''}

      <!-- P2 결과 (완료 시) -->
      ${isDone && liability.liability ? `
      <div class="result-grid">
        <!-- 면부책 판단 -->
        <div>
          <div class="result-section">
            <h3>면부책 판단</h3>
            <div class="liability-card ${liabilityClass}">
              <div class="liability-value">${liability.liability || ''}</div>
              <div class="liability-branch">${liability['분기'] || ''}</div>
            </div>
          </div>

          ${Object.keys(coverage).length ? `
          <div class="result-section">
            <h3>담보별 판단</h3>
            <table class="coverage-table">
              <tr><th>담보</th><th>판단</th></tr>
              ${Object.entries(coverage).map(([k,v]) => `
                <tr><td>${k}</td>
                    <td class="${v === '면책' ? 'myunchek-cell' : 'buchek-cell'}">${v}</td></tr>
              `).join('')}
            </table>
          </div>` : ''}

          ${surcharge && Object.values(surcharge).some(v=>v>0) ? `
          <div class="result-section">
            <h3>사고부담금 (제11조)</h3>
            <table class="surcharge-table">
              <tr><th>담보</th><th>금액</th></tr>
              <tr><td>대인배상 I</td><td>${surcharge['대인I'] ? surcharge['대인I']+'만원' : '-'}</td></tr>
              <tr><td>대인배상 II</td><td>${surcharge['대인II'] ? surcharge['대인II']+'만원' : '-'}</td></tr>
              <tr><td>대물배상</td><td>${surcharge['대물'] ? surcharge['대물']+'만원' : '-'}</td></tr>
            </table>
          </div>` : ''}
        </div>

        <!-- 근거 -->
        <div>
          ${triggers.length ? `
          <div class="result-section">
            <h3>감지된 트리거</h3>
            <div class="tag-list">
              ${triggers.map(t => `<span class="tag red">${t}</span>`).join('')}
            </div>
          </div>` : ''}

          ${(liability['약관근거']||[]).length ? `
          <div class="result-section">
            <h3>약관 근거</h3>
            <div class="tag-list">
              ${(liability['약관근거']||[]).map(a => `<span class="tag">${a}</span>`).join('')}
            </div>
          </div>` : ''}

          ${(liability['판례근거']||[]).length ? `
          <div class="result-section">
            <h3>판례 근거</h3>
            <div class="tag-list">
              ${(liability['판례근거']||[]).map(v => `<span class="tag green">${v}</span>`).join('')}
            </div>
          </div>` : ''}

          ${liability['근거요약'] ? `
          <div class="result-section">
            <h3>판단 근거 요약</h3>
            <div class="fact-box">${liability['근거요약']}</div>
          </div>` : ''}
        </div>
      </div>

      <!-- 검색된 약관 조항 -->
      ${clauses.length ? `
      <div class="result-section">
        <h3>검색된 약관 조항</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${clauses.slice(0,3).map(c => `
            <details style="border:1px solid #e5e7eb;border-radius:8px;padding:10px">
              <summary style="cursor:pointer;font-weight:600;font-size:0.9rem">
                ${c.article} ${c.title} [${c.page}페이지]
              </summary>
              <p style="margin-top:8px;font-size:0.85rem;line-height:1.6;color:#444">
                ${c.text.substring(0,400)}...
              </p>
            </details>
          `).join('')}
        </div>
      </div>` : ''}

      <!-- 검색된 판결문 -->
      ${verdicts.length ? `
      <div class="result-section">
        <h3>검색된 판결문</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${verdicts.slice(0,3).map(v => `
            <details style="border:1px solid #e5e7eb;border-radius:8px;padding:10px">
              <summary style="cursor:pointer;font-weight:600;font-size:0.9rem">
                ${v.case_num} ${v.court} ${v.date ? '('+v.date+')' : ''}
              </summary>
              <p style="margin-top:8px;font-size:0.85rem;line-height:1.6;color:#444">
                <strong>판시:</strong> ${v.issue.substring(0,200)}<br>
                <strong>요지:</strong> ${v.summary.substring(0,300)}
              </p>
            </details>
          `).join('')}
        </div>
      </div>` : ''}
      ` : ''}
    </div>
  `;
}

// ── 삭제 ────────────────────────────────────────────
async function deleteCase(caseId) {
  if (!confirm(`${caseId} 사건을 삭제하시겠습니까?`)) return;
  await fetch(`${API}/api/cases/${caseId}`, { method: 'DELETE' });
  currentCaseId = null;
  document.getElementById('mainArea').innerHTML = `
    <div class="empty-state">
      <div class="icon">🚗</div>
      <div>새 사건을 접수하거나 목록에서 사건을 선택하세요</div>
    </div>`;
  await loadCases();
}

// ── 로딩 ────────────────────────────────────────────
function showLoading(text) {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

// ── 프레임 확대 ─────────────────────────────────────
function openFrame(url) {
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  modal.innerHTML = `<img src="${url}" style="max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 32px rgba(0,0,0,0.5)">`;
  modal.onclick = () => modal.remove();
  document.body.appendChild(modal);
}

// ── 초기화 ──────────────────────────────────────────
loadCases();
</script>
</body>
</html>
